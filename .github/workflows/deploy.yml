name: 🚀 Deploy
on:
  push:
    branches:
      - main
      - develop
  pull_request: {}
  workflow_dispatch:
    inputs:
      staging_url:
        description: HTTPS origin of the deployed staging release
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: 🔎 Type check
        run: npm run typecheck --if-present

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: ⚡ Run vitest
        run: npm run test -- --coverage

  postgres-schema:
    name: 🐘 PostgreSQL schema
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veud_load_test
          POSTGRES_PASSWORD: veud
          POSTGRES_USER: veud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veud -d veud_load_test" --health-interval
          5s --health-timeout 5s --health-retries 10
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🐘 Generate PostgreSQL client
        run: npm run prisma:generate:postgres

      - name: 🧱 Apply PostgreSQL migrations
        run: npm run db:migrate:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud_load_test

      - name: 🔎 Verify migration and datamodel parity
        run: npm run db:verify:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud_load_test

      - name: 🧪 Smoke-test PostgreSQL application queries
        run: npm run db:smoke:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud_load_test

      - name: 📈 Smoke-test catalog load harness
        run:
          npm run db:loadtest:postgres -- --commit --count 2000 --cleanup-after
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud_load_test

  audit:
    name: 🛡 Audit
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🛡 npm audit (high and above)
        run: npm audit --audit-level=high

  browser-smoke:
    name: 🎭 Browser acceptance and quality gates
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 📥 Install Chromium
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run critical browser workflows and quality gates
        run: npm run test:e2e:run -- --project=chromium

      - name: 📊 Upload browser report and visual diffs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: browser-acceptance-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  staging-canary:
    name: 🌐 Deployed staging canary
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    environment: staging
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🔎 Check deployed staging release
        run: >-
          npm run staging:check -- --base-url "$STAGING_URL" --repeat 3 --run
        env:
          STAGING_URL: ${{ inputs.staging_url }}

      - name: 📊 Upload staging evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: staging-acceptance-report
          path: test-results/staging-acceptance-*.json
          retention-days: 30

  build:
    name: 🏗 Build
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        run: npm ci

      - name: 🏄 Copy env vars
        run: cp .env.example .env

      - name: 🏗 Build (compile smoke test)
        run: npm run build

      - name: 📦 Enforce client bundle budgets
        run: npm run bundle:check
