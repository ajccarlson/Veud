  build:
    name: 🏗 Build
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🏄 Copy env vars
        run: cp .env.example .env

      - name: 🏗 Build (compile smoke test)
        run: npm run build
