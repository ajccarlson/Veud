name: 🚀 Deploy
on:
  push:
    branches:
      - main
      - dev
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: 🔬 Lint
        run: npm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: 🔎 Type check
        run: npm run typecheck --if-present

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🖼 Build icons
        run: npm run build:icons

      - name: ⚡ Run vitest
        run: npm run test -- --coverage

  postgres-schema:
    name: 🐘 PostgreSQL schema
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veud
          POSTGRES_PASSWORD: veud
          POSTGRES_USER: veud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veud -d veud"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🐘 Generate PostgreSQL client
        run: npm run prisma:generate:postgres

      - name: 🧱 Apply PostgreSQL migrations
        run: npm run db:migrate:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud

      - name: 🔎 Verify migration and datamodel parity
        run: npm run db:verify:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud

      - name: 🧪 Smoke-test PostgreSQL application queries
        run: npm run db:smoke:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud

  audit:
    name: 🛡 Audit (non-blocking)
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🛡 npm audit (high and above)
        run: npm audit --audit-level=high
        continue-on-error: true

