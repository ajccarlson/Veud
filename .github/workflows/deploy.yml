name: 🧪 Manual quality gates

# Hosted runners are intentionally opt-in. Codex runs the same release gates
# locally before repository merges so routine pushes, PR updates, and Dependabot
# branches do not consume the repository's monthly Actions allowance.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: Validation suite to run
        required: true
        default: app
        type: choice
        options:
          - app
          - postgres
          - staging
          - all
      staging_url:
        description: HTTPS staging origin (required for staging or all)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-quality:
    name: 🧪 Application release validation
    if: inputs.suite == 'app' || inputs.suite == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📥 Download deps
        run: npm ci

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 📥 Install Chromium
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run local-equivalent release gates
        run: npm run validate:release

      - name: 🛡 Audit dependencies
        run: npm audit --audit-level=high

      - name: 📊 Upload browser report and visual diffs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: browser-acceptance-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  postgres-schema:
    name: 🐘 PostgreSQL release validation
    if: inputs.suite == 'postgres' || inputs.suite == 'all'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veud_load_test
          POSTGRES_PASSWORD: veud
          POSTGRES_USER: veud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veud -d veud_load_test" --health-interval
          5s --health-timeout 5s --health-retries 10
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📥 Download deps
        run: npm ci

      - name: 🐘 Run isolated PostgreSQL release gates
        run: npm run validate:release:postgres
        env:
          DATABASE_URL: postgresql://veud:veud@localhost:5432/veud_load_test

  staging-canary:
    name: 🌐 Deployed staging canary
    if: inputs.suite == 'staging' || inputs.suite == 'all'
    runs-on: ubuntu-22.04
    environment: staging
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v7

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 📥 Download deps
        run: npm ci

      - name: 🔐 Require an HTTPS staging origin
        run: |
          case "$STAGING_URL" in
            https://*) ;;
            *) echo "staging_url must be an HTTPS origin" >&2; exit 1 ;;
          esac
        env:
          STAGING_URL: ${{ inputs.staging_url }}

      - name: 🔎 Check deployed staging release
        run: >-
          npm run staging:check -- --base-url "$STAGING_URL" --repeat 3 --run
        env:
          STAGING_URL: ${{ inputs.staging_url }}

      - name: 📊 Upload staging evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: staging-acceptance-report
          path: test-results/staging-acceptance-*.json
          retention-days: 30
